name : deploy-infrastructure

on:
    push:
        branches: [main]
            
env:
    AWS_REGION: us-east-1
    TF_VERSION: 1.6.0

jobs:
    deploy-app:
        name: deploy app to s3
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: aws cred conf
              uses: aws-actions/configure-aws-credentials@v4
              with: 
                aws-access-key-id : ${{secrets.AWS_ACCESS_KEY_ID}}
                aws-secret-access-key : ${{secrets.AWS_SECRET_ACCESS_KEY}}
                aws-region : ${{env.AWS_REGION}}
            - name: upload index.html to s3
              run: |
                aws s3 cp app/index.html s3://mayur-ha-infra-app-files/index.html

    
    terraform:
        name: terraform deploy
        runs-on: ubuntu-latest
        needs: deploy-app
        env:                              # job level — all steps inherit
            TF_VAR_project_name:     "mayur-ha-infra"
            TF_VAR_ami_id:           "ami-0ec10929233384c7f"
            TF_VAR_key_name:         "mayur-key"
            TF_VAR_my_ip:            ${{ secrets.MY_IP }}
            TF_VAR_instance_type:    "t2.micro"
            TF_VAR_desired_capacity: "2"
            TF_VAR_min_size:         "1"
            TF_VAR_max_size:         "4"
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            - uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ env.AWS_REGION }}
            - uses: hashicorp/setup-terraform@v3
              with:
                 terraform_version: ${{ env.TF_VERSION }}  
            -  name: terraform init
               run: terraform init
            -  name: terraform format check
               run: terrafrom fmt -check
               continue-on-error: true
            -  name: terraform validate
               run: terraform validate
            -  name: terraform plan
               run: terraform plan -out=tfplan
            -  name: terraform apply
               if: github.event_name == 'push' && github.ref == 'refs/heads/main'  
               run: terraform apply -auto-approve tfplan
            -  name: Show ALB DNS
               if: github.event_name == 'push'
               run: terraform output alb_dns_name

