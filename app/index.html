<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project 1 — AWS HA Infrastructure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px;
      max-width: 560px;
      width: 90%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #22c55e20;
      color: #22c55e;
      border: 1px solid #22c55e40;
      border-radius: 999px;
      font-size: 13px;
      padding: 4px 14px;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .info-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px 16px;
    }

    .info-box .label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .info-box .value {
      font-size: 14px;
      font-weight: 600;
      color: #38bdf8;
      word-break: break-all;
    }

    .stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .tag {
      background: #1e40af20;
      color: #93c5fd;
      border: 1px solid #1e40af40;
      border-radius: 6px;
      font-size: 12px;
      padding: 4px 10px;
    }

    .footer {
      font-size: 12px;
      color: #475569;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="badge">
      <span class="dot"></span> Instance Healthy
    </div>

    <h1>AWS HA Infrastructure</h1>
    <p class="subtitle">Terraform · ALB · Auto Scaling Group · CI/CD</p>

    <div class="info-grid">
      <div class="info-box">
        <div class="label">Instance ID</div>
        <div class="value">INSTANCE_ID</div>
      </div>
      <div class="info-box">
        <div class="label">Availability Zone</div>
        <div class="value">AVAILABILITY_ZONE</div>
      </div>
      <div class="info-box">
        <div class="label">Region</div>
        <div class="value">us-east-1</div>
      </div>
      <div class="info-box">
        <div class="label">Served By</div>
        <div class="value">Nginx</div>
      </div>
    </div>

    <div class="stack">
      <span class="tag">Terraform</span>
      <span class="tag">VPC</span>
      <span class="tag">ALB</span>
      <span class="tag">Auto Scaling</span>
      <span class="tag">GitHub Actions</span>
      <span class="tag">S3</span>
    </div>

    <p class="footer">
      Refresh the page — ALB will route you to a different AZ each time!
    </p>

  </div>
</body>
</html>
